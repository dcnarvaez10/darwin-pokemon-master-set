<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Darwin Pokémon Master Set</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Darwin Pokémon Master Set</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Search Pokémon..."
      autocomplete="off"
    />

    <select id="ownerFilter">
      <option value="Darwin">Darwin</option>
    </select>

    <select id="setFilter">
      <option value="Black Bolt">Black Bolt</option>
    </select>

    <select id="missingFilter">
      <option value="All">All Cards</option>
    </select>

    <select id="sortSelect">
      <option value="numberAsc">Card Number ↑</option>
      <option value="numberDesc">Card Number ↓</option>
      <option value="alpha">A → Z</option>
    </select>
  </header>

  <main>
    <div id="statusMessage">Loading cards...</div>
    <div id="results" class="results"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
